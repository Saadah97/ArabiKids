<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArabiKIDS - Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .emerald-bg { background-color: #22C55E; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-lg w-full max-w-sm text-center">
            <h1 class="text-3xl font-bold text-green-500 mb-6">ArabiKIDS</h1>
            <input type="email" id="email" placeholder="E-mel" class="w-full p-3 mb-4 border rounded-xl outline-none focus:ring-2 focus:ring-green-400">
            <input type="password" id="password" placeholder="Kata Laluan" class="w-full p-3 mb-6 border rounded-xl outline-none focus:ring-2 focus:ring-green-400">
            <button id="loginBtn" class="w-full emerald-bg text-white py-3 rounded-xl font-bold text-lg">Log Masuk</button>
        </div>
    </div>

    <div id="dashboard" class="hidden-section pb-20">
        <header class="emerald-bg text-white p-6 rounded-b-3xl shadow-lg text-center">
            <h1 class="text-3xl font-bold">ArabiKIDS</h1>
            <p class="text-sm opacity-90">Selamat Datang, Adik!</p>
        </header>

        <main class="max-w-md mx-auto p-4 grid grid-cols-2 gap-4 mt-4">
            <div class="col-span-2 bg-white p-6 rounded-2xl shadow-md text-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Mari Belajar Hari Ini!</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow text-center cursor-pointer">📖<br>Belajar</div>
            <div class="bg-white p-4 rounded-2xl shadow text-center cursor-pointer">🎮<br>Permainan</div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtFzrMWQ70vRCVhoECHxjjY0hP5WXkw74",
            authDomain: "arab-pro-kids.firebaseapp.com",
            projectId: "arab-pro-kids",
            storageBucket: "arab-pro-kids.firebasestorage.app",
            messagingSenderId: "648161412378",
            appId: "1:648161412378:web:a48dfaa66ce896f5b098a3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Log Masuk Fungsi
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => alert("Gagal Log Masuk: " + error.message));
        });

        // Pantau Status Pengguna
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginPage').classList.add('hidden-section');
                document.getElementById('dashboard').classList.remove('hidden-section');
            } else {
                document.getElementById('loginPage').classList.remove('hidden-section');
                document.getElementById('dashboard').classList.add('hidden-section');
            }
        });
    </script>
</body>
</html>
