<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arab PRO Kids | Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .card-ui { transition: 0.3s; cursor: pointer; border-radius: 24px; }
        .card-ui:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="p-5 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white">🕌</div>
            <h1 class="text-xl font-bold text-emerald-800">Arab PRO Kids</h1>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        
        <section id="login-section" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
            <h2 class="text-2xl font-bold text-center mb-6 text-emerald-800">Log Masuk</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-mel" class="w-full p-4 rounded-xl border border-gray-200 outline-emerald-500">
                <input type="password" id="password" placeholder="Kata Laluan" class="w-full p-4 rounded-xl border border-gray-200 outline-emerald-500">
                <button id="login-btn" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 transition">
                    Sign In
                </button>
            </div>
        </section>

        <div id="dashboard-content" class="hidden">
            <div class="flex justify-between items-center my-6">
                <h2 class="text-2xl font-bold">Modul Pembelajaran</h2>
                <div class="font-bold text-sm bg-white px-4 py-2 rounded-full shadow-sm">
                    <span class="text-amber-500 mr-2">⭐ 1,240 XP</span>
                    <span class="text-blue-500">🔥 12 Hari</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="card-ui bg-white p-6 border-b-4 border-emerald-400">
                    <div class="text-4xl mb-3">🔤</div>
                    <h3 class="font-bold">Hijaiyah</h3>
                </div>
                <div class="card-ui bg-white p-6 border-b-4 border-blue-400">
                    <div class="text-4xl mb-3">🗣️</div>
                    <h3 class="font-bold">Dialog</h3>
                </div>
                <div class="card-ui bg-white p-6 border-b-4 border-purple-400">
                    <div class="text-4xl mb-3">🎮</div>
                    <h3 class="font-bold">Permainan</h3>
                </div>
                <div class="card-ui bg-white p-6 border-b-4 border-orange-400">
                    <div class="text-4xl mb-3">🤖</div>
                    <h3 class="font-bold">AI Tutor</h3>
                </div>
            </div>

            <section class="mt-10 bg-indigo-900 rounded-3xl p-8 text-white">
                <h2 class="text-2xl font-bold mb-4">Tanya AI Tutor</h2>
                <div class="flex gap-2">
                    <input type="text" class="w-full p-4 rounded-xl text-black" placeholder="Cth: Apa maksud 'Baitun' dalam BM?">
                    <button class="bg-emerald-500 px-6 rounded-xl font-bold">Hantar</button>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAgWg-g_38nN2PHgr--UFslxDdO2sFL_7g",
            authDomain: "arabikids-807db.firebaseapp.com",
            databaseURL: "https://arabikids-807db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "arabikids-807db",
            storageBucket: "arabikids-807db.firebasestorage.app",
            messagingSenderId: "643172313995",
            appId: "1:643172313995:web:2ee886ef6db9dd960b1d8e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Logik butang Sign In
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dashboard-content').classList.remove('hidden');
                })
                .catch((error) => {
                    alert("Gagal Log Masuk: " + error.message);
                });
        });
    </script>
</body>
</html>
